name: Firebase Hosting Client

on:
  push:
    branches: [rev2026]
    paths:
      - ".github/workflows/firebase-hosting-client.yml"
      - "src/adaos/integrations/adaos-client/**"
  workflow_dispatch:

concurrency:
  group: firebase-hosting-client-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy client to Firebase Hosting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/adaos/integrations/adaos-client
    env:
      PUBLIC_ROOT_BASE: ${{ secrets.PUBLIC_ROOT_BASE || 'https://api.inimatic.com' }}
      PUBLIC_ADAOS_BASE: ${{ secrets.PUBLIC_ADAOS_BASE || '' }}
      PUBLIC_ADAOS_TOKEN: ${{ secrets.PUBLIC_ADAOS_TOKEN || '' }}
      PUBLIC_DEFAULT_ZONE_ID: ${{ secrets.PUBLIC_DEFAULT_ZONE_ID || 'ru' }}
      PUBLIC_ZONES_JSON: ${{ secrets.PUBLIC_ZONES_JSON || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/adaos/integrations/adaos-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYINIMATIC }}

      - name: Build hosting bundle
        run: npm run build:hosting

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --project myinimatic --only hosting --non-interactive
