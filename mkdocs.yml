strict: true
site_name: AdaOS
site_description: "AdaOS developer and runtime documentation"
site_url: https://stipot-com.github.io/adaos/
repo_url: https://github.com/stipot-com/adaos
repo_name: stipot-com/adaos
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/adaos_wb.svg
  favicon: assets/ADAOS_32_light.png
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: green
      accent: yellow
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: green
      accent: yellow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stipot-com/adaos
  alternate:
    - name: English
      link: /
      lang: en
    - name: Русский
      link: /ru/
      lang: ru

plugins:
  - search:
      lang: [en, ru]
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
        - locale: ru
          name: Русский
          nav_translations:
            Home: Главная
            Quickstart: Быстрый старт
            Architecture: Архитектура
            Overview: Обзор
            Runtime Overview: Обзор runtime
            Layers: Слои
            Agent Context: Agent Context
            Security: Безопасность
            CLI: CLI
            API Service: API-сервис
            Runtime And Operations: Runtime и операции
            SDK: SDK
            Bus: Bus
            Context: Context
            Decorators: Decorators
            Adapters: Adapters
            Control Plane: Control Plane
            Skills: Навыки
            Scenarios: Сценарии
            DevPortal: DevPortal
            Roadmap: Дорожная карта
            Concepts: Концепции
            Codebase: Кодовая база
            Web Client: Веб клиент
            User Interface: Интерфейс пользователя
            Personalization: Профиль пользователя
            LLM DevOps Stages: Этапы LLM DevOps
            LLM DevOps Preparation: Этапы LLM DevOps - подготовка
            Root MCP Foundation: Root MCP Foundation
            NLU: Интерпретация намерений
            NLU Teacher: NLU Teacher
            Device Initialization: Инициализация устройства
            Event Management: Управление событиями
            Data Management: Управление данными
            AdaOS Resource Locator: AdaOS Resource Locator
            Context Compression: Компрессия контекста
            Scenario Concepts: Сценарии
            Skills And Scenarios: Навыки и сценарии
            Dev Scenarios: Dev-сценарии
            Scenario Start: Старт сценария
            Scenario Runtime: Runtime сценария
            First Launch Scenario: Первый запуск сценария
            Scenario Target State: Сценарии и целевое состояние
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      type: date

watch:
  - src/adaos

extra_css:
  - assets/graphviz-fix.css

extra_javascript:
  - https://cdn.jsdelivr.net/gh/rod2ik/cdn@main/mkjavascripts/mkdocs-graphviz.js

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - tables
  - def_list
  - pymdownx.details
  - pymdownx.mark
  - mkdocs_graphviz
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture:
      - Overview: architecture/index.md
      - Runtime Overview: architecture/overview.md
      - Layers: architecture/layers.md
      - Agent Context: architecture/context.md
      - Security: architecture/security.md
      - Infrascope: architecture/infrascope.md
      - Root MCP Foundation: architecture/root-mcp-foundation.md
      - Infrascope Roadmap: architecture/infrascope-roadmap.md
      - Registry Marketplace And Operations: architecture/registry-marketplace-operations-roadmap.md
  - CLI:
      - Overview: cli/index.md
      - API Service: cli/api.md
      - Runtime And Operations: cli/runtime.md
  - SDK:
      - Overview: sdk/index.md
      - Bus: sdk/bus.md
      - Context: sdk/context.md
      - Decorators: sdk/decorators.md
      - Adapters: sdk/adapters.md
      - Control Plane: sdk_control_plane.md
  - Skills: skills.md
  - Scenarios: scenarios.md
  - DevPortal: devportal.md
  - Roadmap: roadmap.md
  - Concepts:
      - Codebase: concepts/codeflow.md
      - Web Client: concepts/web-client.md
      - User Interface: concepts/ui.md
      - Personalization: concepts/personalization.md
      - LLM DevOps Stages: concepts/dev_stages.md
      - LLM DevOps Preparation: concepts/dev_stage_prepare.md
      - NLU: concepts/nlu.md
      - NLU Teacher: concepts/nlu-teacher-llm.md
      - Device Initialization: concepts/init_device.md
      - Event Management: concepts/event_mgmnt.md
      - Data Management: concepts/data_mgmnt.md
      - AdaOS Resource Locator: concepts/arl.md
      - Context Compression: concepts/context_compression.md
      - Scenario Concepts:
          - Skills And Scenarios: concepts/skills-and-scenarios.md
          - Dev Scenarios: concepts/dev-scenarios.md
          - Scenario Start: concepts/start_scenario.md
          - Scenario Runtime: concepts/scenario-procedural-runtime.md
          - First Launch Scenario: concepts/scenario-first-launch.md
          - Scenario Target State: concepts/scenarios-target-state.md

copyright: |
  &copy; 2026 AdaOS
