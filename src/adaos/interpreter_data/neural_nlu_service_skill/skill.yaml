name: neural_nlu_service_skill
version: 0.1.0
description: Local neural intent detector service for AdaOS NLU pipeline
runtime:
  kind: service
  env:
    mode: global
service:
  host: 127.0.0.1
  port: 18091
  command: ["-m", "handlers.main"]
  healthcheck:
    path: /health
    timeout_ms: 1000
permissions:
  - network
events:
  subscribe:
    - nlp.intent.detect.neural
  publish:
    - nlp.intent.detected
    - nlp.intent.detect.rasa
