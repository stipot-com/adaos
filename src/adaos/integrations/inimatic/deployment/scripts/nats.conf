port: $NATS_PORT

# HTTP monitoring
http: $NATS_HTTP_PORT

# JetStream storage in data volume
jetstream: { store_dir: "/data" }

# WebSocket listener (TLS is terminated by reverse-proxy)
websocket { port: 8080, no_tls: true, same_origin: false }

# Backend/root services keep using the static internal user.
# Hub/browser-side NATS websocket clients authenticate via NATS auth_callout,
# so `/nats` can go directly to NATS without the backend ws-nats-proxy in the data path.
authorization {
  timeout: 3s
  users: [
    { user: $NATS_USER, password: $NATS_PASS }
  ]
  auth_callout {
    issuer: $NATS_ISSUER_PUB
    auth_users: [ $NATS_USER ]
  }
}
