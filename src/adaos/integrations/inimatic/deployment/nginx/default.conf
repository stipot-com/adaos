server {
    listen 8080;
    server_name _;
    charset utf-8;
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }

    location = /app-fresh.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files /index.html =404;
    }

    location = /runtime-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }

    location = /assets/tv-diagnostic.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }

    location = /assets/tv-diagnostic.css {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }

    location = /ngsw.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        return 410;
    }

    location = /ngsw-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        return 410;
    }

    location = /worker-basic.min.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        return 410;
    }

    location = /safety-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        return 410;
    }

    # Never rewrite real asset requests to index.html. Missing hashed bundles must return 404,
    # otherwise browsers treat HTML as a broken script/module and cached shells become confusing.
    location ~* \.(?:js|mjs|css|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot|json|webmanifest)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
