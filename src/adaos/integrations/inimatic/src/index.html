<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Inimatic App</title>

	<base href="/" />
	<script>
		(function (window) {
			var request;
			var host;
			var isLocal;
			try {
				request = new XMLHttpRequest();
				request.open('GET', '/runtime-config.json', false);
				request.send(null);
				if (request.status >= 200 && request.status < 300 && request.responseText) {
					var cfg = JSON.parse(request.responseText);
					if (cfg && typeof cfg.rootBase === 'string' && cfg.rootBase) {
						window.__ADAOS_ROOT_BASE__ = cfg.rootBase;
					}
					if (cfg && typeof cfg.adaosBase === 'string' && cfg.adaosBase) {
						window.__ADAOS_BASE__ = cfg.adaosBase;
					}
					if (cfg && typeof cfg.adaosToken === 'string' && cfg.adaosToken) {
						window.__ADAOS_TOKEN__ = cfg.adaosToken;
					}
				}
			} catch (err) {}
			if (!window.__ADAOS_ROOT_BASE__) {
				host = String((window.location && window.location.hostname) || '').toLowerCase();
				isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
				window.__ADAOS_ROOT_BASE__ = isLocal ? 'http://127.0.0.1:3030' : 'https://api.inimatic.com';
			}
		})(window);
	</script>
	<script>
		(function (window, document) {
			var boot = {
				overlayId: 'inimatic-boot-overlay',
				statusId: 'inimatic-boot-status',
				detailId: 'inimatic-boot-detail',
				hide: function () {
					var node = document.getElementById(this.overlayId);
					if (node && node.parentNode) {
						node.parentNode.removeChild(node);
					}
				},
				update: function (status, detail, failed) {
					var statusNode = document.getElementById(this.statusId);
					var detailNode = document.getElementById(this.detailId);
					var overlay = document.getElementById(this.overlayId);
					if (!statusNode || !detailNode || !overlay) return;
					statusNode.textContent = status || 'Loading Inimatic...';
					detailNode.textContent = detail || '';
					overlay.setAttribute('data-failed', failed ? '1' : '0');
				},
				fail: function (status, detail) {
					this.update(status || 'App failed to start', detail || '', true);
				}
			};
			window.__INIMATIC_BOOT__ = boot;
			document.addEventListener('DOMContentLoaded', function () {
				var body = document.body || document.getElementsByTagName('body')[0];
				var overlay = document.createElement('div');
				overlay.id = boot.overlayId;
				overlay.setAttribute('data-failed', '0');
				overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:#f7f5ef;color:#1f2933;font:16px/1.45 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;';
				overlay.innerHTML =
					'<div style="max-width:680px;background:#ffffff;border:1px solid #d9e2ec;border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(15,23,42,0.08)">' +
						'<div style="font-size:24px;line-height:1.2;margin-bottom:12px">Inimatic</div>' +
						'<div id="' + boot.statusId + '" style="font-size:18px;margin-bottom:8px">Loading Inimatic...</div>' +
						'<pre id="' + boot.detailId + '" style="white-space:pre-wrap;word-break:break-word;margin:0;color:#52606d;font:14px/1.4 ui-monospace,SFMono-Regular,Consolas,monospace"></pre>' +
					'</div>';
				if (body) {
					body.insertBefore(overlay, body.firstChild);
				}
				window.setTimeout(function () {
					var node = document.getElementById(boot.overlayId);
					if (node && node.getAttribute('data-failed') !== '1') {
						boot.update(
							'Still loading...',
							'If this screen stays visible on a SmartTV, the browser likely accepts TLS but cannot execute the web app bundle.'
						);
					}
				}, 8000);
			});
			window.addEventListener('error', function (event) {
				var target = event && event.target;
				if (target && target.tagName === 'SCRIPT') {
					boot.fail('Failed to load app script', target.src || 'script load error');
					return;
				}
				boot.fail('JavaScript error', (event && event.message) || 'unknown error');
			}, true);
			window.addEventListener('unhandledrejection', function (event) {
				var reason = event && event.reason;
				var detail = '';
				if (reason && typeof reason === 'object' && reason.message) {
					detail = String(reason.message);
				} else if (typeof reason === 'string') {
					detail = reason;
				} else {
					detail = 'unhandled promise rejection';
				}
				boot.fail('Unhandled promise rejection', detail);
			});
		})(window, document);
	</script>
	<!-- <meta name="color-scheme" content="light dark"/> -->
	<meta name="viewport"
		content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<meta name="format-detection" content="telephone=no" />
	<meta name="msapplication-tap-highlight" content="no" />
	<meta name="mobile-web-app-capable" content="yes" />

	<link rel="icon" href="assets/icon/favicon.svg" type="image/svg+xml">
	<link rel="icon" type="image/png" href="assets/icon/favicon.png" />

	<!-- add to homescreen for ios -->
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="theme-color" content="#1976d2">
</head>

<body>
	<app-root></app-root>
	<noscript>Please enable JavaScript to continue using this application.</noscript>
	<script nomodule src="assets/legacy-browser.js"></script>
</body>

</html>
