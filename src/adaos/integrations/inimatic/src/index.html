<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Inimatic App</title>

	<base href="/" />
	<script>
		(function (window, document) {
			try {
				if (typeof window.globalThis === 'undefined') {
					window.globalThis = window;
				}
			} catch (err) {}
			try {
				window.global = window;
			} catch (err) {}
			try {
				if (typeof window.matchMedia !== 'function') {
					window.matchMedia = function (query) {
						return {
							matches: false,
							media: String(query || ''),
							onchange: null,
							addListener: function () {},
							removeListener: function () {},
							addEventListener: function () {},
							removeEventListener: function () {},
							dispatchEvent: function () { return false; },
						};
					};
				}
			} catch (err) {}
			try {
				if (typeof window.CustomEvent !== 'function' && document && typeof document.createEvent === 'function') {
					var CustomEventPolyfill = function (event, params) {
						var init = params || { bubbles: false, cancelable: false, detail: null };
						var evt = document.createEvent('CustomEvent');
						evt.initCustomEvent(event, !!init.bubbles, !!init.cancelable, init.detail);
						return evt;
					};
					CustomEventPolyfill.prototype = window.Event ? window.Event.prototype : {};
					window.CustomEvent = CustomEventPolyfill;
				}
			} catch (err) {}
			try {
				if (typeof window.requestAnimationFrame !== 'function') {
					window.requestAnimationFrame = function (cb) {
						return window.setTimeout(function () { cb(Date.now()); }, 16);
					};
				}
				if (typeof window.cancelAnimationFrame !== 'function') {
					window.cancelAnimationFrame = function (id) {
						window.clearTimeout(id);
					};
				}
			} catch (err) {}
		})(window, document);
	</script>
	<script>
		(function (window) {
			var request;
			var host;
			var isLocal;
			try {
				request = new XMLHttpRequest();
				request.open('GET', '/runtime-config.json', false);
				request.send(null);
				if (request.status >= 200 && request.status < 300 && request.responseText) {
					var cfg = JSON.parse(request.responseText);
					if (cfg && typeof cfg.rootBase === 'string' && cfg.rootBase) {
						window.__ADAOS_ROOT_BASE__ = cfg.rootBase;
					}
					if (cfg && typeof cfg.adaosBase === 'string' && cfg.adaosBase) {
						window.__ADAOS_BASE__ = cfg.adaosBase;
					}
					if (cfg && typeof cfg.adaosToken === 'string' && cfg.adaosToken) {
						window.__ADAOS_TOKEN__ = cfg.adaosToken;
					}
				}
			} catch (err) {}
			if (!window.__ADAOS_ROOT_BASE__) {
				host = String((window.location && window.location.hostname) || '').toLowerCase();
				isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
				window.__ADAOS_ROOT_BASE__ = isLocal ? 'http://127.0.0.1:3030' : 'https://api.inimatic.com';
			}
		})(window);
	</script>
	<script>
		(function (window) {
			var host = String((window.location && window.location.hostname) || '').toLowerCase();
			var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
			var keepSw = false;
			try {
				keepSw = /(?:\?|&)keep_sw=1(?:&|$)/.test(String(window.location.search || ''));
			} catch (err) {}
			if (isLocal || keepSw) return;
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (registrations) {
					for (var i = 0; i < registrations.length; i += 1) {
						registrations[i].unregister();
					}
				}).catch(function () {});
			}
			if (window.caches && typeof window.caches.keys === 'function') {
				window.caches.keys().then(function (keys) {
					return Promise.all(keys.map(function (key) {
						return window.caches.delete(key).catch(function () { return false; });
					}));
				}).catch(function () {});
			}
		})(window);
	</script>
	<script>
		(function (window, document) {
			var hydrationLogged = false;
			var bootDebugEnabled = false;
			try {
				bootDebugEnabled = /(?:\?|&)boot_debug=1(?:&|$)/.test(String(window.location.search || ''));
				if (!bootDebugEnabled && window.localStorage) {
					bootDebugEnabled = String(window.localStorage.getItem('inimatic_boot_debug') || '') === '1';
				}
			} catch (err) {}
			var boot = {
				overlayId: 'inimatic-boot-overlay',
				statusId: 'inimatic-boot-status',
				detailId: 'inimatic-boot-detail',
				debugEnabled: bootDebugEnabled,
				done: false,
				failed: false,
				timer: null,
				lines: [],
				lastStatus: '',
				lastDetail: '',
				removeOverlay: function () {
					var node = document.getElementById(this.overlayId);
					if (node && node.parentNode) {
						node.parentNode.removeChild(node);
					}
				},
				ensureOverlay: function () {
					var root = document.documentElement || document.getElementsByTagName('html')[0];
					var overlay;
					var prefersDark = false;
					var rootStyles;
					var backdrop = 'rgba(100, 116, 139, 0.38)';
					var surface = 'rgba(255, 255, 255, 0.94)';
					var text = '#111827';
					var detail = '#475569';
					var border = 'rgba(148, 163, 184, 0.28)';
					if (!root || this.done || (!this.debugEnabled && !this.failed)) return;
					overlay = document.getElementById(this.overlayId);
					if (overlay) return;
					try {
						prefersDark = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
					} catch (err) {}
					if (prefersDark) {
						backdrop = 'rgba(15, 23, 42, 0.58)';
						surface = 'rgba(15, 23, 42, 0.92)';
						text = '#e5eef7';
						detail = '#cbd5e1';
						border = 'rgba(148, 163, 184, 0.24)';
					}
					try {
						rootStyles = window.getComputedStyle ? window.getComputedStyle(document.documentElement) : null;
						if (rootStyles) {
							surface = (rootStyles.getPropertyValue('--ion-background-color') || surface).trim() || surface;
							text = (rootStyles.getPropertyValue('--ion-text-color') || text).trim() || text;
						}
					} catch (err) {}
					overlay = document.createElement('div');
					overlay.id = this.overlayId;
					overlay.setAttribute('data-failed', this.failed ? '1' : '0');
					overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:' + backdrop + ';backdrop-filter:blur(6px);color:' + text + ';font:16px/1.45 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;';
					overlay.innerHTML =
						'<div style="max-width:680px;background:' + surface + ';border:1px solid ' + border + ';border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(15,23,42,0.16)">' +
							'<div style="font-size:24px;line-height:1.2;margin-bottom:12px">Inimatic</div>' +
							'<div id="' + this.statusId + '" style="font-size:18px;margin-bottom:8px">Loading Inimatic...</div>' +
							'<pre id="' + this.detailId + '" style="white-space:pre-wrap;word-break:break-word;margin:0;color:' + detail + ';font:14px/1.4 ui-monospace,SFMono-Regular,Consolas,monospace"></pre>' +
						'</div>';
					root.appendChild(overlay);
				},
				note: function (message) {
					if (!message) return;
					this.lines.push(String(message));
					if (this.lines.length > 12) {
						this.lines.splice(0, this.lines.length - 12);
					}
					if (this.failed) {
						this.update(this.lastStatus || 'App failed to start', this.lastDetail || '', true);
					}
				},
				renderDetail: function (detail) {
					var out = [];
					var i;
					if (detail) out.push(String(detail));
					if (this.lines.length) {
						if (out.length) out.push('');
						out.push('Boot log:');
						for (i = 0; i < this.lines.length; i += 1) {
							out.push('- ' + this.lines[i]);
						}
					}
					return out.join('\n');
				},
				startSlowTimer: function () {
					var self = this;
					if (!this.debugEnabled || this.timer || this.done || this.failed) return;
					this.timer = window.setTimeout(function () {
						var node = document.getElementById(self.overlayId);
						if (node && node.getAttribute('data-failed') !== '1' && !self.done) {
							self.update(
								'Still loading...',
								'If this screen stays visible on a SmartTV, the browser likely accepts TLS but cannot execute the web app bundle.'
							);
						}
					}, 8000);
				},
				stopSlowTimer: function () {
					if (this.timer) {
						window.clearTimeout(this.timer);
						this.timer = null;
					}
				},
				hide: function () {
					this.done = true;
					this.stopSlowTimer();
					this.removeOverlay();
				},
				recover: function (status, detail) {
					this.failed = false;
					this.stopSlowTimer();
					if (!this.debugEnabled) {
						this.removeOverlay();
						return;
					}
					this.update(status || 'Loading Inimatic...', detail || '', false);
				},
				update: function (status, detail, failed) {
					if (!this.debugEnabled && !failed) return;
					this.ensureOverlay();
					var statusNode = document.getElementById(this.statusId);
					var detailNode = document.getElementById(this.detailId);
					var overlay = document.getElementById(this.overlayId);
					this.lastStatus = status || 'Loading Inimatic...';
					this.lastDetail = detail || '';
					if (typeof failed === 'boolean') {
						this.failed = failed;
					}
					if (!statusNode || !detailNode || !overlay) return;
					statusNode.textContent = this.lastStatus;
					detailNode.textContent = this.renderDetail(this.lastDetail);
					overlay.setAttribute('data-failed', failed ? '1' : '0');
				},
				fail: function (status, detail) {
					this.failed = true;
					this.stopSlowTimer();
					this.update(status || 'App failed to start', detail || '', true);
				},
				describeTarget: function (target) {
					var tag;
					if (!target) return '';
					tag = String(target.tagName || '').toUpperCase();
					if (tag === 'SCRIPT') {
						return 'script ' + String(target.src || target.getAttribute && target.getAttribute('src') || '(inline)');
					}
					if (tag === 'LINK') {
						return 'link ' + String(target.href || target.getAttribute && target.getAttribute('href') || '(inline)');
					}
					return tag || 'unknown target';
				},
				describeErrorEvent: function (event) {
					var bits = [];
					var target = event && event.target;
					var err = event && event.error;
					var filename = event && event.filename;
					var lineno = event && event.lineno;
					var colno = event && event.colno;
					if (target && target !== window) {
						bits.push(this.describeTarget(target));
					}
					if (event && event.message) {
						bits.push(String(event.message));
					}
					if (filename) {
						bits.push(String(filename) + (lineno ? ':' + lineno : '') + (colno ? ':' + colno : ''));
					}
					if (err && err.name && err.message) {
						bits.push(String(err.name) + ': ' + String(err.message));
					} else if (err && err.message) {
						bits.push(String(err.message));
					}
					if (err && err.stack) {
						bits.push(String(err.stack));
					}
					return bits.join('\n') || 'unknown error';
				},
				describeElementUpgrade: function (tagName) {
					var node = null;
					var ctor = null;
					var present = 'no';
					var defined = 'no';
					var upgraded = 'no';
					var shadow = 'no';
					try {
						node = document.querySelector(tagName);
						ctor = window.customElements && window.customElements.get ? window.customElements.get(tagName) : null;
						present = node ? 'yes' : 'no';
						defined = ctor ? 'yes' : 'no';
						upgraded = node && ctor && node instanceof ctor ? 'yes' : 'no';
						shadow = node && node.shadowRoot ? 'yes' : 'no';
					} catch (err) {
						return tagName + '=error';
					}
					return tagName + '(present/defined/upgraded/shadow)=' + present + '/' + defined + '/' + upgraded + '/' + shadow;
				},
				isUiReady: function () {
					var appNode;
					var appCtor;
					var contentNode;
					var contentCtor;
					try {
						appNode = document.querySelector('ion-app');
						appCtor = window.customElements && window.customElements.get ? window.customElements.get('ion-app') : null;
						contentNode = document.querySelector('ion-content');
						contentCtor = window.customElements && window.customElements.get ? window.customElements.get('ion-content') : null;
						if (appNode && appCtor && appNode instanceof appCtor) return true;
						if (contentNode && contentCtor && contentNode instanceof contentCtor) return true;
					} catch (err) {}
					return false;
				},
				tryUpgradeUi: function (reason) {
					try {
						if (!window.customElements || typeof window.customElements.upgrade !== 'function') return;
						window.customElements.upgrade(document.documentElement);
						this.note('customElements.upgrade: ' + reason);
					} catch (err) {
						this.note('customElements.upgrade failed: ' + ((err && err.message) || err || 'unknown'));
					}
				},
				describeUiHydration: function () {
					var htmlHydrated = 'no';
					var htmlIonCe = 'no';
					try {
						htmlHydrated = document.documentElement.classList.contains('hydrated') ? 'yes' : 'no';
						htmlIonCe = document.documentElement.classList.contains('ion-ce') ? 'yes' : 'no';
					} catch (err) {}
					return 'html.hydrated=' + htmlHydrated +
						', html.ion-ce=' + htmlIonCe +
						', ' + this.describeElementUpgrade('ion-app') +
						', ' + this.describeElementUpgrade('ion-router-outlet') +
						', ' + this.describeElementUpgrade('ion-content') +
						', ' + this.describeElementUpgrade('ion-button');
				}
			};
			window.__INIMATIC_BOOT__ = boot;
			document.addEventListener('DOMContentLoaded', function () {
				boot.note('DOMContentLoaded');
				boot.note(boot.describeUiHydration());
				boot.tryUpgradeUi('DOMContentLoaded');
				boot.startSlowTimer();
			});
			window.addEventListener('load', function () {
				boot.note('window.load');
				boot.note(boot.describeUiHydration());
				boot.tryUpgradeUi('window.load');
			});
			window.setInterval(function () {
				try {
					if (boot.isUiReady() && !hydrationLogged) {
						hydrationLogged = true;
						boot.note('ionic.ce.ready=yes');
						boot.note(boot.describeUiHydration());
					} else if (!hydrationLogged) {
						boot.note(boot.describeUiHydration());
						boot.tryUpgradeUi('poll');
					}
				} catch (err) {}
			}, 3000);
			boot.note(
				'compat globalThis=' + (typeof window.globalThis !== 'undefined' ? 'yes' : 'no') +
				', matchMedia=' + (typeof window.matchMedia === 'function' ? 'yes' : 'no') +
				', CustomEvent=' + (typeof window.CustomEvent === 'function' ? 'yes' : 'no')
			);
			window.addEventListener('error', function (event) {
				var target = event && event.target;
				if (target && target.tagName === 'SCRIPT') {
					boot.fail('Failed to load app script', target.src || 'script load error');
					return;
				}
				if (target && target.tagName === 'LINK') {
					boot.note('stylesheet load issue: ' + boot.describeTarget(target));
					return;
				}
				boot.fail('JavaScript error', boot.describeErrorEvent(event));
			}, true);
			window.addEventListener('unhandledrejection', function (event) {
				var reason = event && event.reason;
				var detail = '';
				if (reason && typeof reason === 'object' && reason.message) {
					detail = String(reason.message);
					if (reason.stack) {
						detail += '\n' + String(reason.stack);
					}
				} else if (typeof reason === 'string') {
					detail = reason;
				} else {
					detail = 'unhandled promise rejection';
				}
				if (
					(reason && reason.name === 'AbortError') ||
					/signal is aborted without reason/i.test(detail) ||
					/\bAbortError\b/i.test(detail)
				) {
					boot.note('ignored abort rejection: ' + detail.split('\n')[0]);
					return;
				}
				boot.fail('Unhandled promise rejection', detail);
			});
		})(window, document);
	</script>
