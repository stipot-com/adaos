<ion-app>
	<ion-header [translucent]="false" [class]="isAndroid? 'android_header' : ''">
			<ion-toolbar>
			<ion-buttons slot="start">
				<ng-container *ngIf="isAuthenticated; else unauthLogo">
					<ng-container *ngIf="isNarrow && sidebarAvailable; else wideHome">
						<ion-button (click)="toggleSidebar()">
							<ion-icon name="menu-outline"></ion-icon>
						</ion-button>
					</ng-container>
					<ng-template #wideHome>
						<ion-button (click)="onClickHome()">
							<ion-icon name="home-outline"></ion-icon>
						</ion-button>
					</ng-template>
				</ng-container>
				<ng-template #unauthLogo>
					<img class="unauth-logo" [src]="logoSrc" alt="Inimatic" />
				</ng-template>
			</ion-buttons>
			<ion-title>
				<div class="app-title">
					<ng-container *ngIf="isAuthenticated; else wordmarkPlain">
						<ion-button
							class="wordmark-btn"
							fill="clear"
							size="small"
							(click)="onClickHome()"
							aria-label="Home"
						>
							<img class="brand-logo" [src]="logoSrc" alt="" aria-hidden="true" />
							<span class="wordmark">INIMATIC</span>
						</ion-button>
					</ng-container>
					<ng-template #wordmarkPlain>
						<span class="brand-mark">
							<img class="brand-logo" [src]="logoSrc" alt="" aria-hidden="true" />
							<span class="wordmark">INIMATIC</span>
						</span>
					</ng-template>
					<span class="build-id" *ngIf="buildId">{{ buildId }}</span>
					<span class="hub-status" *ngIf="hubStatus$ | async as hub">
						<span class="dot" [attr.data-status]="hub" aria-hidden="true"></span>
						<span class="label">{{ ('status.' + hub) | t }}</span>
					</span>
					<span class="transport-status" *ngIf="transportState$ | async as ts"
						[attr.data-transport]="ts"
						[title]="ts === 'ws' ? ('transport.cloud_relay' | t) : ts === 'connected' ? ('transport.p2p' | t) : ''">
						<ion-icon *ngIf="ts === 'ws'" name="cloud-outline" class="transport-icon ws"></ion-icon>
						<ion-icon *ngIf="ts === 'connected'" name="flash-outline" class="transport-icon p2p"></ion-icon>
					</span>
					<ng-container *ngIf="isAuthenticated">
						<span
							class="semantic-status"
							*ngIf="semanticStatus$ | async as sem"
							[attr.data-health]="sem.health"
							[title]="sem.title"
						>{{ sem.label }}</span>
					</ng-container>
					<span class="subnet-id" *ngIf="subnetId as sid" [title]="'subnet_id: ' + sid">{{ sid }}</span>
					<ion-button
						*ngIf="isAuthenticated"
						class="logout-btn"
						fill="clear"
						size="small"
						(click)="onClickLogout()"
						[attr.aria-label]="'aria.logout_debug' | t"
					>
						<ion-icon name="log-out-outline"></ion-icon>
					</ion-button>
				</div>
			</ion-title>
			<ion-buttons slot="end">
				<ion-button
					*ngIf="isAuthenticated && showAppsCatalogButton"
					(click)="onClickAppsCatalog()"
					title="Apps"
					aria-label="Apps"
				>
					<ion-icon name="apps-outline"></ion-icon>
				</ion-button>
				<ion-button
					*ngIf="isAuthenticated && showWidgetsCatalogButton"
					(click)="onClickWidgetsCatalog()"
					title="Widgets"
					aria-label="Widgets"
				>
					<ion-icon name="layers-outline"></ion-icon>
				</ion-button>
				<ion-button
					*ngIf="isAuthenticated"
					(click)="onClickNotifications()"
					title="Notifications"
					aria-label="Notifications"
				>
					<ion-icon name="notifications-outline"></ion-icon>
				</ion-button>
				<ion-button
					*ngIf="isAuthenticated"
					(click)="onClickWorkspaces()"
					title="Workspaces"
					aria-label="Workspaces"
				>
					<ion-icon name="folder-open-outline"></ion-icon>
				</ion-button>
				<ion-button
					*ngIf="isAuthenticated && canSetCurrentScenarioHome"
					(click)="onClickSetCurrentScenarioHome()"
					title="Set current scenario as home"
					aria-label="Set current scenario as home"
				>
					<ion-icon name="bookmark-outline"></ion-icon>
				</ion-button>
				<ion-button
					*ngIf="isAuthenticated && showCloseToDesktop"
					(click)="onClickCloseToDesktop()"
					aria-label="Close"
				>
					<ion-icon name="close-outline"></ion-icon>
				</ion-button>
				<ion-button *ngIf="isAuthenticated" (click)="onClickYjsReload()" [attr.aria-label]="'aria.reload' | t">
					<ion-icon name="refresh-outline"></ion-icon>
				</ion-button>
			</ion-buttons>
		</ion-toolbar>
	</ion-header>
	<ion-router-outlet></ion-router-outlet>
</ion-app>
