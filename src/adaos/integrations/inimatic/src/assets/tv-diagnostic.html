<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Inimatic TV Diagnostic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link id="diag-style" rel="stylesheet" href="/assets/tv-diagnostic.css" />
  <script>
    (function (window, document) {
      var results = [];
      var startedAt = Date.now();

      function asText(value) {
        if (value === null) return 'null';
        if (value === undefined) return 'undefined';
        if (typeof value === 'string') return value;
        try {
          return JSON.stringify(value);
        } catch (err) {
          try {
            return String(value);
          } catch (err2) {
            return '[unprintable]';
          }
        }
      }

      function push(kind, label, detail) {
        results.push({
          kind: kind,
          label: label,
          detail: detail ? asText(detail) : '',
          at: Date.now() - startedAt,
        });
        render();
      }

      function render() {
        var body = document.body || document.getElementsByTagName('body')[0];
        var pre;
        var i;
        var lines = [];
        if (!body) return;
        pre = document.getElementById('diag-output');
        if (!pre) return;
        for (i = 0; i < results.length; i += 1) {
          lines.push(
            '[' + results[i].kind.toUpperCase() + '] ' +
            results[i].label +
            (results[i].detail ? ': ' + results[i].detail : '') +
            ' (' + results[i].at + 'ms)'
          );
        }
        pre.textContent = lines.join('\n');
      }

      window.__TV_DIAG__ = {
        ok: function (label, detail) { push('ok', label, detail); },
        warn: function (label, detail) { push('warn', label, detail); },
        fail: function (label, detail) { push('fail', label, detail); },
        note: function (label, detail) { push('note', label, detail); },
      };

      window.addEventListener('error', function (event) {
        var target = event && event.target;
        if (target && target.tagName === 'SCRIPT') {
          push('fail', 'script load', target.src || '(inline)');
          return;
        }
        if (target && target.tagName === 'LINK') {
          push('fail', 'stylesheet load', target.href || '(inline)');
          return;
        }
        push(
          'fail',
          'window.error',
          [
            event && event.message ? String(event.message) : 'unknown error',
            event && event.filename ? String(event.filename) : '',
            event && event.lineno ? 'line ' + event.lineno : '',
            event && event.colno ? 'col ' + event.colno : '',
          ].filter(Boolean).join(' | ')
        );
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason;
        var detail = '';
        if (reason && typeof reason === 'object' && reason.message) {
          detail = String(reason.message);
        } else if (typeof reason === 'string') {
          detail = reason;
        } else {
          detail = 'unhandled rejection';
        }
        push('fail', 'unhandledrejection', detail);
      });

      document.addEventListener('DOMContentLoaded', function () {
        var styleLink = document.getElementById('diag-style');
        push('ok', 'DOMContentLoaded');
        push('note', 'userAgent', navigator.userAgent || '');
        push('note', 'language', navigator.language || '');
        push('note', 'location', window.location.href || '');
        push('ok', 'inline script executed');
        push('ok', 'globalThis', typeof window.globalThis !== 'undefined' ? 'present' : 'missing');
        push('ok', 'Promise', typeof window.Promise === 'function' ? 'present' : 'missing');
        push('ok', 'fetch', typeof window.fetch === 'function' ? 'present' : 'missing');
        push('ok', 'URL', typeof window.URL === 'function' ? 'present' : 'missing');
        push('ok', 'matchMedia', typeof window.matchMedia === 'function' ? 'present' : 'missing');
        push('ok', 'CustomEvent', typeof window.CustomEvent === 'function' ? 'present' : 'missing');
        push('ok', 'requestAnimationFrame', typeof window.requestAnimationFrame === 'function' ? 'present' : 'missing');
        if (styleLink) {
          styleLink.addEventListener('load', function () {
            push('ok', 'stylesheet load', styleLink.href || '');
          });
          styleLink.addEventListener('error', function () {
            push('fail', 'stylesheet load', styleLink.href || '');
          });
        }
        try {
          localStorage.setItem('__tv_diag__', '1');
          localStorage.removeItem('__tv_diag__');
          push('ok', 'localStorage', 'write ok');
        } catch (err) {
          push('warn', 'localStorage', err && err.message ? err.message : 'unavailable');
        }
        try {
          sessionStorage.setItem('__tv_diag__', '1');
          sessionStorage.removeItem('__tv_diag__');
          push('ok', 'sessionStorage', 'write ok');
        } catch (err) {
          push('warn', 'sessionStorage', err && err.message ? err.message : 'unavailable');
        }
        try {
          if (typeof window.fetch === 'function') {
            window.fetch('/runtime-config.json', { cache: 'no-store' })
              .then(function (response) {
                push('ok', 'fetch /runtime-config.json', response.status + ' ' + response.type);
                return response.text();
              })
              .then(function (text) {
                push('note', 'runtime-config bytes', String((text || '').length));
              })
              .catch(function (err) {
                push('fail', 'fetch /runtime-config.json', err && err.message ? err.message : 'failed');
              });
          }
        } catch (err) {
          push('fail', 'fetch /runtime-config.json', err && err.message ? err.message : 'failed');
        }
        window.setTimeout(function () {
          if (window.__TV_DIAG_MODULE__ === true) {
            push('ok', 'module script', 'executed');
          } else {
            push('warn', 'module script', 'not executed');
          }
          if (window.__TV_DIAG_NOMODULE__ === true) {
            push('warn', 'nomodule fallback', 'executed');
          }
        }, 1200);
      });

      window.addEventListener('load', function () {
        push('ok', 'window.load');
      });
    })(window, document);
  </script>
  <script type="module">
    window.__TV_DIAG_MODULE__ = true;
  </script>
  <script nomodule>
    window.__TV_DIAG_NOMODULE__ = true;
  </script>
</head>

<body>
  <main class="diag-shell">
    <h1>Inimatic TV Diagnostic</h1>
    <p class="lead">Open this page on the TV to check what the browser can actually execute before loading the app.</p>
    <pre id="diag-output">Starting diagnostic...</pre>
  </main>
</body>

</html>
